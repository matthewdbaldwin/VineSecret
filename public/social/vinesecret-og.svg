<?xml version="1.0" encoding="UTF-8"?>
<!--
  VineSecret — Open Graph Social Card
  Design template: 1200 × 630 px (standard OG ratio)

  TO CREATE THE FINAL IMAGE:
  1. Open this file in a browser (Chrome/Edge work best)
  2. Set browser zoom to 100%
  3. Screenshot the full card area OR use a tool like:
       - Inkscape: File → Export PNG (1200×630)
       - Chrome headless: chrome --screenshot --window-size=1200,630 vinesecret-og.svg
  4. Save as public/social/vinesecret-og.jpg (optimize to ~200–400 KB)
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#09040d"/>
      <stop offset="60%"  stop-color="#14091f"/>
      <stop offset="100%" stop-color="#1c0e2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Outer border frame -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#b8915a" stroke-width="1" opacity="0.35"/>

  <!-- Left vertical gold accent -->
  <rect x="72" y="72" width="2" height="486" fill="#b8915a" opacity="0.55"/>

  <!-- Eyebrow -->
  <text x="92" y="136"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600"
        fill="#b8915a"
        letter-spacing="5">ORANGE COUNTY, CA  ·  ESTATE WINERY</text>

  <!-- Main wordmark -->
  <text x="92" y="278"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="108" font-weight="300"
        fill="#f4efe6"
        letter-spacing="-3">VineSecret</text>

  <!-- Gold rule below wordmark -->
  <line x1="92" y1="308" x2="360" y2="308" stroke="#b8915a" stroke-width="1" opacity="0.6"/>

  <!-- Tagline line 1 -->
  <text x="92" y="352"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="300"
        fill="rgba(244,239,230,0.62)"
        letter-spacing="0.4">Small-lot wines from five estate vineyards.</text>

  <!-- Tagline line 2 -->
  <text x="92" y="382"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="300"
        fill="rgba(244,239,230,0.62)"
        letter-spacing="0.4">Guest checkout  ·  Cold-pack delivery  ·  Cellar tastings.</text>

  <!-- URL watermark -->
  <text x="92" y="516"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400"
        fill="rgba(244,239,230,0.28)"
        letter-spacing="3.5">VINESECRET.COM</text>

  <!-- Right side — concentric circle motif (terroir / estate seal) -->
  <circle cx="962" cy="315" r="270" fill="none" stroke="#b8915a" stroke-width="0.5" opacity="0.10"/>
  <circle cx="962" cy="315" r="210" fill="none" stroke="#b8915a" stroke-width="0.75" opacity="0.16"/>
  <circle cx="962" cy="315" r="152" fill="none" stroke="#b8915a" stroke-width="1" opacity="0.22"/>
  <circle cx="962" cy="315" r="96"  fill="none" stroke="#b8915a" stroke-width="1.5" opacity="0.30"/>
  <circle cx="962" cy="315" r="46"  fill="#7a2558" opacity="0.40"/>
  <circle cx="962" cy="315" r="22"  fill="#7a2558" opacity="0.72"/>

  <!-- Crosshair on seal -->
  <line x1="962" y1="272" x2="962" y2="358" stroke="#b8915a" stroke-width="0.75" opacity="0.38"/>
  <line x1="919" y1="315" x2="1005" y2="315" stroke="#b8915a" stroke-width="0.75" opacity="0.38"/>

  <!-- Seal label -->
  <text x="962" y="416"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="700"
        fill="#b8915a"
        letter-spacing="4"
        text-anchor="middle"
        opacity="0.65">LIMITED RELEASE</text>
</svg>
